# Walker C1 / Astron bridge configuration — mirrors the real-robot SDK topics
# so the same control code runs against sim (ROS_DOMAIN_ID=146) and the real
# robot (ROS_DOMAIN_ID=0). C1 has dexterous hands only (no grippers), so there
# are no grip topics.

zmq:
  cmd_port: 5655
  status_port: 5656
  image_port: 5657
  jpeg_image_port: 5658

topics:
  sub:
    command: {topic: "/mc/sdk/robot_command", type: "RobotCommand", qos: 5}
    left_hand_command: {topic: "/mc/left_hand/command", type: "JointCommand", qos: 5}
    right_hand_command: {topic: "/mc/right_hand/command", type: "JointCommand", qos: 5}
    reset: {topic: "/sim/cmd_reset", type: "Bool", qos: 1}
    set_object_pose: {topic: "/sim/cmd_set_object_pose", type: "Point", qos: 1}

  pub:
    state: {topic: "/mc/sdk/robot_state", type: "RobotState", qos: 10}
    left_hand_state: {topic: "/mc/left_hand/joint_states", type: "JointState", qos: 10}
    right_hand_state: {topic: "/mc/right_hand/joint_states", type: "JointState", qos: 10}
    object_state: {topic: "/sim/object_state", type: "String", qos: 10}
    image_rgb: {topic: "/sensor/camera/head/color/raw", type: "Image", compressed: true}
    image_depth: {topic: "/sensor/camera/head/depth/raw", type: "Image", compressed: true}
