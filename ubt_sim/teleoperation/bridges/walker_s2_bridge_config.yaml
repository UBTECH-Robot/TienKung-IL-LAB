# Walker S2 bridge configuration — independent from Tiangong bridge_config.yaml.

zmq:
  cmd_port: 5655
  status_port: 5656
  image_port: 5657
  jpeg_image_port: 5658

topics:
  sub:
    command: {topic: "/mc/sdk/robot_command", type: "RobotCommand", qos: 5}
    left_hand_command: {topic: "/mc/left_hand/command", type: "JointCommand", qos: 5}
    right_hand_command: {topic: "/mc/right_hand/command", type: "JointCommand", qos: 5}
    left_grip_command: {topic: "/ecat/left_grip/cmd", type: "GripCmd", qos: 5}
    right_grip_command: {topic: "/ecat/right_grip/cmd", type: "GripCmd", qos: 5}
    reset: {topic: "/sim/cmd_reset", type: "Bool", qos: 1}

  pub:
    state: {topic: "/mc/sdk/robot_state", type: "RobotState", qos: 10}
    left_hand_state: {topic: "/mc/left_hand/joint_states", type: "JointState", qos: 10}
    right_hand_state: {topic: "/mc/right_hand/joint_states", type: "JointState", qos: 10}
    left_grip_state: {topic: "/ecat/left_grip/state", type: "GripStatus", qos: 10}
    right_grip_state: {topic: "/ecat/right_grip/state", type: "GripStatus", qos: 10}
    image_rgb: {topic: "/sensor/camera/stereo/color/raw", type: "Image", compressed: true}
    image_depth: {topic: "/sensor/camera/stereo/depth/raw", type: "Image", compressed: true}
