# Tiangong Pro Parlor Task Configuration
# All paths are relative to the assets/ directory

scene:
  usd_path: "scenes/parlor/scene_v2.usd"
  prim_path: "{ENV_REGEX_NS}/Scene"

robot:
  name: "tiangong_pro"
  usd_path: "robots/tiangong_pro/tiangong_pro_v2.usd"
  init_state:
    pos: [7.80, 6.08257, 0.02]
    rot: [0.99939, 0.0, 0.0349, 0.0]  # Forward tilt 4 degrees (Y-axis rotation)

cameras:
  head_rgb:
    prim_path: "{ENV_REGEX_NS}/Robot/head_camera_rgb"
    data_types: ["rgb"]
    resolution: [640, 480]
  head_depth:
    prim_path: "{ENV_REGEX_NS}/Robot/head_camera_depth"
    data_types: ["depth"]
    resolution: [640, 480]

simulation:
  dt: 0.01
  decimation: 1
  render_interval: 3
  episode_length_s: 60
